<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Find, compare, and book campsites across Washington and Oregon. Search by showers, price, site type, and distance.">
  <meta name="theme-color" content="#1a3a2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏕️</text></svg>">
  <title>geno-camp — Find & Book Campsites</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">
        <span class="logo-icon">🏕️</span>
        <h1>geno-camp</h1>
        <span class="tagline">Pacific Northwest · Summer 2026</span>
      </div>
      <div class="header-actions">
        <button class="view-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle dark mode">
          <span id="themeIcon">🌙</span>
        </button>
        <button class="view-toggle" id="favToggle" onclick="toggleFavoritesFilter()">
          <span id="favIcon">♡</span> <span id="favLabel">Favorites</span>
        </button>
        <button class="view-toggle" id="viewToggle" onclick="toggleView()">
          <span id="viewIcon">🗺️</span> <span id="viewLabel">Map</span>
        </button>
        <button class="cart-btn" id="cartBtn" onclick="toggleCart()">
          <span class="cart-icon">🛒</span>
          <span class="cart-count" id="cartCount">0</span>
        </button>
      </div>
    </div>
  </header>

  <div class="filters-bar">
    <div class="filters-content">
      <div class="search-row">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="Search campsites, locations, amenities..." oninput="loadCampsites()">
          <kbd class="search-shortcut" id="searchShortcut">/</kbd>
        </div>
        <button class="compare-btn" id="compareBtn" onclick="openCompare()" style="display:none">
          Compare <span id="compareCount">0</span>
        </button>
      </div>
      <div class="filter-row">
        <div class="filter-group">
          <label for="stateFilter">State</label>
          <select id="stateFilter" onchange="onStateChange()">
            <option value="all">All States</option>
            <option value="WA">Washington</option>
            <option value="OR">Oregon</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="regionFilter">Region</label>
          <select id="regionFilter" onchange="loadCampsites()">
            <option value="all">All Regions</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="showerFilter">Showers</label>
          <select id="showerFilter" onchange="loadCampsites()">
            <option value="all">Any</option>
            <option value="free">Free</option>
            <option value="coin-op">Coin-op</option>
            <option value="token">Token</option>
            <option value="hot-springs">Hot Springs</option>
            <option value="none">None (NPS)</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="siteFilter">Site Type</label>
          <select id="siteFilter" onchange="loadCampsites()">
            <option value="all">Any</option>
            <option value="tent">Tent</option>
            <option value="RV">RV</option>
            <option value="cabin">Cabin</option>
            <option value="lodging">Lodging</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="sortFilter">Sort by</label>
          <select id="sortFilter" onchange="loadCampsites()">
            <option value="rating">Rating</option>
            <option value="price">Price</option>
            <option value="reviews">Most Reviewed</option>
            <option value="distance-seattle">Nearest to Seattle</option>
            <option value="distance-portland">Nearest to Portland</option>
            <option value="distance-bend">Nearest to Bend</option>
          </select>
        </div>
        <div class="filter-group price-range-group">
          <label>Price Range</label>
          <div class="price-range-inputs">
            <input type="number" id="minPrice" placeholder="Min" min="0" oninput="loadCampsites()">
            <span class="price-dash">–</span>
            <input type="number" id="maxPrice" placeholder="Max" min="0" oninput="loadCampsites()">
          </div>
        </div>
      </div>
      <div class="filter-meta-row">
        <div class="platform-tags" id="platformTags"></div>
        <div class="result-count" id="resultCount"></div>
      </div>
    </div>
  </div>

  <main>
    <div class="main-layout" id="mainLayout">
      <div class="campsite-grid" id="campsiteGrid"></div>
      <div class="map-pane" id="mapPane" style="display:none">
        <div id="map"></div>
      </div>
    </div>
  </main>

  <!-- Cart Sidebar -->
  <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>
  <aside class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h2>Your Trip Cart</h2>
      <button class="close-btn" onclick="toggleCart()">&times;</button>
    </div>
    <div class="cart-items" id="cartItems">
      <p class="empty-cart">No campsites added yet.<br>Browse and click "Add to Trip" to get started.</p>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="cart-total">
        <span>Estimated Total</span>
        <span id="cartTotal">$0</span>
      </div>
      <button class="checkout-btn" onclick="checkout()">Book All Sites →</button>
      <p class="checkout-note">Opens booking instructions for each site</p>
    </div>
  </aside>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
  <div class="modal detail-modal" id="detailModal">
    <button class="close-btn modal-close" onclick="closeModal()">&times;</button>
    <div id="modalContent"></div>
  </div>

  <!-- Compare Modal -->
  <div class="modal-overlay" id="compareOverlay" onclick="closeCompare()"></div>
  <div class="modal compare-modal" id="compareModal">
    <button class="close-btn modal-close" onclick="closeCompare()">&times;</button>
    <div id="compareContent"></div>
  </div>

  <!-- Checkout Modal -->
  <div class="modal-overlay" id="checkoutOverlay" onclick="closeCheckout()"></div>
  <div class="modal checkout-modal" id="checkoutModal">
    <button class="close-btn modal-close" onclick="closeCheckout()">&times;</button>
    <div id="checkoutContent"></div>
  </div>

  <footer>
    <div class="footer-content">
      <span>geno-camp · Part of the <a href="https://github.com/42euge/geno-tools" target="_blank" rel="noopener">geno ecosystem</a></span>
      <span>20 campsites · 2 states · 4 platforms</span>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
